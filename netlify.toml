# Override stale Netlify UI "dist" publish dir — Next.js outputs to .next
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Plugin is auto-installed by Netlify for Next.js — no need to pin here.

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200
