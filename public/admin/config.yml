backend:
  name: git-gateway
  branch: main
  squash_merges: true

# Save commits to a draft branch (PR); Publish merges to main and goes live.
publish_mode: editorial_workflow

# Enable offline/local editing against the dev server (npm run dev).
local_backend: true

# Site media lives under public/ (projects, uploads, etc.) so the Media tab shows all assets.
media_folder: public
public_folder: /

site_url: https://jackwingateportfolio.netlify.app

show_preview_links: true

x-typography: &typography
  label: Typography
  name: typography
  widget: object
  collapsed: true
  required: false
  fields:
    - label: Font
      name: font
      widget: select
      options: [sans, deco]
      default: sans
    - label: Weight
      name: weight
      widget: select
      options: [thin, extralight, light, regular, medium, semibold, bold, black]
      default: medium
    - label: Style
      name: style
      widget: select
      options: [normal, italic]
      default: normal
    - label: Size
      name: size
      widget: select
      options: [xs, sm, base, lg, xl, 2xl, 3xl, 4xl, 5xl, 6xl, 7xl]
      default: base

x-section-style: &section-style
  label: Section style
  name: sectionStyle
  widget: object
  collapsed: true
  required: false
  fields:
    - label: Padding top
      name: paddingTop
      widget: select
      options: [none, sm, md, lg]
      required: false
    - label: Padding bottom
      name: paddingBottom
      widget: select
      options: [none, sm, md, lg]
      required: false
    - label: Background
      name: background
      widget: select
      options: [none, surface]
      required: false
    - label: Text tone
      name: textTone
      widget: select
      options: [default, muted]
      required: false

x-button-fields: &button-fields
  - label: Label
    name: label
    widget: string
  - label: Link
    name: href
    widget: string
    required: false
  - label: Variant
    name: variant
    widget: select
    options: [primary, secondary, ghost]
    default: primary
  - label: Size
    name: size
    widget: select
    options: [sm, md, lg]
    default: md
  - label: Icon
    name: icon
    widget: select
    options:
      - arrow-left
      - arrow-right
      - arrow-up
      - arrow-down
      - chevron-left
      - chevron-right
      - chevron-up
      - chevron-down
      - checkmark
      - cross
      - plus
      - minus
      - search
      - download
      - upload
      - link
      - location
      - filter
      - refresh
      - sun
      - moon
      - star
      - info-circle
      - help-circle
    required: false
  - label: Icon position
    name: iconPosition
    widget: select
    options: [left, right]
    default: right
    required: false

x-page-settings: &page-settings
  - label: Title
    name: title
    widget: string
  - label: SEO title
    name: seoTitle
    widget: string
    required: false
    hint: Overrides the page title in search results and browser tabs
  - label: SEO description
    name: seoDescription
    widget: text
    required: false
  - label: Social preview image
    name: ogImage
    widget: image
    required: false
  - label: Page width
    name: pageWidth
    widget: select
    options:
      - { label: Narrow, value: narrow }
      - { label: Default, value: default }
      - { label: Wide, value: wide }
      - { label: Full bleed, value: full }
    default: full
    required: false
  - label: Show back link
    name: showBackLink
    widget: boolean
    required: false
  - label: Back link label
    name: backLabel
    widget: string
    required: false
  - label: Back link URL
    name: backHref
    widget: string
    required: false

x-img-layout: &img-layout
  label: Layout
  name: layout
  widget: select
  options:
    - { label: Full width, value: full }
    - { label: Fill width (edge to edge, cropped), value: bleed }
    - { label: Inset, value: inset }
    - { label: Small, value: small }
  default: inset
  required: false

x-img-aspect: &img-aspect
  label: Aspect ratio
  name: aspect
  widget: select
  options:
    - { label: Natural (no crop), value: auto }
    - { label: Square (1:1), value: square }
    - { label: Standard (4:3), value: standard }
    - { label: Video (16:9), value: video }
    - { label: Portrait (3:4), value: portrait }
    - { label: Tall (4:5), value: tall }
    - { label: Cinematic (21:9), value: cinematic }
  default: video
  required: false

x-img-fit: &img-fit
  label: Image fit
  name: fit
  widget: select
  options:
    - { label: Cover (fill frame, may crop), value: cover }
    - { label: Contain (show full image), value: contain }
  default: cover
  required: false

x-img-crop: &img-crop
  label: Crop focus
  name: crop
  widget: select
  hint: Which part of the image to keep when cropping (Cover fit)
  options:
    - { label: Center, value: center }
    - { label: Top, value: top }
    - { label: Bottom, value: bottom }
    - { label: Left, value: left }
    - { label: Right, value: right }
  default: center
  required: false

x-img-align: &img-align
  label: Alignment
  name: align
  widget: select
  options:
    - { label: Left, value: left }
    - { label: Center, value: center }
    - { label: Right, value: right }
  default: center
  required: false

x-img-radius: &img-radius
  label: Corner radius
  name: radius
  widget: select
  options:
    - { label: Square, value: none }
    - { label: Slightly rounded, value: sm }
    - { label: Rounded, value: lg }
    - { label: Circle / pill, value: full }
  default: lg
  required: false

x-img-border: &img-border
  label: Show border
  name: border
  widget: boolean
  default: true
  required: false

x-block-types: &block-types
  - label: Hero
    name: hero
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Eyebrow, name: eyebrow, widget: string, required: false }
      - { label: Heading, name: heading, widget: string }
      - { label: Body, name: body, widget: text, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Body typography
        <<: *typography
        name: bodyTypography
      - { label: Image, name: image, widget: image, required: false }
      - label: Image display
        name: imageDisplay
        widget: object
        collapsed: true
        required: false
        fields:
          - *img-aspect
          - *img-fit
          - *img-crop
          - *img-radius
          - *img-border
      - label: Layout
        name: layout
        widget: select
        options: [centered, left, split-right, split-left]
        default: left
        required: false
      - label: Min height
        name: minHeight
        widget: select
        options: [auto, medium, tall]
        default: tall
        required: false
      - label: Buttons
        name: buttons
        widget: list
        required: false
        fields: *button-fields
      - <<: *section-style

  - label: Heading
    name: heading
    widget: object
    summary: "{{fields.text}}"
    fields:
      - { label: Text, name: text, widget: string }
      - <<: *typography
      - label: Alignment
        name: align
        widget: select
        options: [left, center]
        default: left
        required: false
      - <<: *section-style

  - label: Text
    name: text
    widget: object
    summary: "{{fields.body}}"
    fields:
      - { label: Body, name: body, widget: markdown }
      - <<: *typography
      - label: Alignment
        name: align
        widget: select
        options: [left, center]
        default: left
        required: false
      - <<: *section-style

  - label: Image
    name: image
    widget: object
    summary: "{{fields.alt}}"
    fields:
      - { label: Image, name: src, widget: image }
      - { label: Alt text, name: alt, widget: string, required: false }
      - { label: Caption, name: caption, widget: string, required: false }
      - label: Caption alignment
        name: captionAlign
        widget: select
        options: [left, center]
        default: left
        required: false
      - *img-layout
      - *img-aspect
      - *img-fit
      - *img-crop
      - *img-align
      - *img-radius
      - *img-border
      - <<: *section-style

  - label: Gallery
    name: gallery
    widget: object
    summary: "{{fields.images | size}} images"
    fields:
      - label: Images
        name: images
        widget: list
        field: { label: Image, name: image, widget: image }
      - label: Arrangement
        name: arrangement
        widget: select
        options:
          - { label: Grid, value: grid }
          - { label: Vertical stack (touching), value: vertical }
          - { label: Horizontal row (touching), value: horizontal }
        default: grid
        required: false
      - label: Columns
        name: columns
        widget: select
        hint: Only used for Grid arrangement
        options: ["1", "2", "3"]
        default: "2"
        required: false
        condition:
          field: arrangement
          value: grid
      - label: Spacing
        name: gap
        widget: select
        options:
          - { label: None, value: none }
          - { label: Small, value: sm }
          - { label: Medium, value: md }
        default: none
        required: false
      - label: Edge to edge
        name: bleed
        widget: boolean
        hint: Stretch the group to full page width
        default: false
        required: false
      - *img-aspect
      - *img-fit
      - *img-crop
      - *img-radius
      - *img-border
      - <<: *section-style

  - label: Two columns
    name: twoColumn
    widget: object
    summary: Two column layout
    fields:
      - { label: Left column, name: left, widget: markdown }
      - label: Left typography
        <<: *typography
        name: leftTypography
      - { label: Right column, name: right, widget: markdown }
      - label: Right typography
        <<: *typography
        name: rightTypography
      - label: Column ratio
        name: ratio
        widget: select
        options:
          - { label: 50 / 50, value: equal }
          - { label: 40 / 60, value: narrow-wide }
          - { label: 60 / 40, value: wide-narrow }
        default: equal
        required: false
      - <<: *section-style

  - label: Call to action
    name: cta
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - { label: Body, name: body, widget: text, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Body typography
        <<: *typography
        name: bodyTypography
      - label: Buttons
        name: buttons
        widget: list
        required: false
        fields: *button-fields
      - label: Style
        name: style
        widget: select
        options: [card, plain]
        default: card
        required: false
      - <<: *section-style

  - label: Embed
    name: embed
    widget: object
    summary: "{{fields.title}}"
    fields:
      - { label: Title, name: title, widget: string, required: false }
      - { label: Embed URL, name: src, widget: string }
      - label: Aspect
        name: aspect
        widget: select
        options:
          - { label: "Video (16:9)", value: video }
          - { label: Tall page, value: tall }
        default: video
        required: false
      - <<: *section-style

  - label: Spacer
    name: spacer
    widget: object
    summary: "{{fields.size}} spacing"
    fields:
      - label: Size
        name: size
        widget: select
        options: [sm, md, lg, xl]
        default: md
        required: false

  - label: Back link
    name: backLink
    widget: object
    summary: "{{fields.label}}"
    fields:
      - { label: Label, name: label, widget: string, required: false }
      - { label: URL, name: href, widget: string, required: false }

  - label: Featured projects
    name: featuredProjects
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - { label: Link label, name: linkLabel, widget: string, required: false }
      - { label: Link URL, name: linkHref, widget: string, required: false }
      - label: Columns
        name: columns
        widget: select
        options: ["1", "2"]
        default: "2"
        required: false
      - label: Project slugs
        name: projectSlugs
        widget: list
        required: false
        hint: Leave empty to use all featured projects
        field: { label: Slug, name: slug, widget: string }
      - label: Limit
        name: limit
        widget: number
        required: false
        value_type: int
        min: 1
        max: 12
      - <<: *section-style

  - label: Project grid
    name: projectGrid
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - { label: Intro, name: intro, widget: text, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Intro typography
        <<: *typography
        name: introTypography
      - label: Mode
        name: mode
        widget: select
        options:
          - { label: All projects, value: all }
          - { label: Selected projects, value: selected }
        default: all
        required: false
      - label: Project slugs
        name: projectSlugs
        widget: list
        required: false
        hint: Only used when mode is Selected projects
        field: { label: Slug, name: slug, widget: string }
        condition:
          field: mode
          value: selected
      - <<: *section-style

  - label: Video
    name: video
    widget: object
    summary: "{{fields.caption}}"
    fields:
      - { label: Video URL, name: src, widget: string }
      - { label: Poster image, name: poster, widget: image, required: false }
      - { label: Caption, name: caption, widget: string, required: false }
      - { label: Autoplay, name: autoplay, widget: boolean, default: false, required: false }
      - { label: Loop, name: loop, widget: boolean, default: false, required: false }
      - { label: Muted, name: muted, widget: boolean, default: false, required: false }
      - <<: *section-style

  - label: Quote
    name: quote
    widget: object
    summary: "{{fields.text}}"
    fields:
      - { label: Quote, name: text, widget: text }
      - { label: Attribution, name: cite, widget: string, required: false }
      - <<: *typography
      - <<: *section-style

  - label: FAQ
    name: faq
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Items
        name: items
        widget: list
        fields:
          - { label: Question, name: question, widget: string }
          - { label: Answer, name: answer, widget: text }
      - <<: *section-style

  - label: Stats
    name: stats
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Items
        name: items
        widget: list
        fields:
          - { label: Value, name: value, widget: string }
          - { label: Label, name: label, widget: string }
      - label: Columns
        name: columns
        widget: select
        options: ["2", "3", "4"]
        default: "3"
        required: false
      - <<: *section-style

  - label: Divider
    name: divider
    widget: object
    summary: Divider
    fields:
      - label: Style
        name: style
        widget: select
        options:
          - { label: Line, value: line }
          - { label: Space only, value: space }
        default: line
        required: false

  - label: Logo strip
    name: logos
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Logos
        name: items
        widget: list
        fields:
          - { label: Name, name: name, widget: string }
          - { label: Logo image, name: image, widget: image }
          - { label: Link URL, name: href, widget: string, required: false }
      - label: Columns
        name: columns
        widget: select
        options: ["3", "4", "5", "6"]
        default: "4"
        required: false
      - <<: *section-style

  - label: Timeline
    name: timeline
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Items
        name: items
        widget: list
        fields:
          - { label: Period, name: period, widget: string, required: false }
          - { label: Title, name: title, widget: string }
          - { label: Subtitle, name: subtitle, widget: string, required: false }
          - { label: Description, name: description, widget: text, required: false }
      - <<: *section-style

  - label: Tag groups
    name: tagGroups
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Groups
        name: groups
        widget: list
        fields:
          - { label: Category, name: category, widget: string }
          - label: Items
            name: items
            widget: list
            field: { label: Item, name: item, widget: string }
      - <<: *section-style

  - label: Bullet list
    name: bulletList
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Items
        name: items
        widget: list
        field: { label: Item, name: item, widget: string }
      - label: List typography
        <<: *typography
        name: typography
      - <<: *section-style

  - label: Link list
    name: linkList
    widget: object
    summary: "{{fields.heading}}"
    fields:
      - { label: Heading, name: heading, widget: string, required: false }
      - label: Heading typography
        <<: *typography
        name: headingTypography
      - label: Links
        name: links
        widget: list
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: href, widget: string }
          - { label: Display text, name: display, widget: string, required: false }
          - { label: External, name: external, widget: boolean, default: false, required: false }
      - <<: *section-style

  - label: Contact form
    name: contactForm
    widget: object
    summary: Contact form
    fields:
      - { label: Submit label, name: submitLabel, widget: string, required: false }
      - { label: Success message, name: successMessage, widget: text, required: false }
      - <<: *section-style

