  - name: pages
    label: Custom pages
    label_singular: Page
    folder: content/pages
    create: true
    slug: "{{slug}}"
    extension: json
    format: json
    identifier_field: title
    summary: "{{title}} — /pages/{{slug}}"
    preview_path: "pages/{{slug}}"
    fields:
      - label: Type
        name: type
        widget: hidden
        default: CustomPage
      - label: Title
        name: title
        widget: string
      - label: URL slug
        name: slug
